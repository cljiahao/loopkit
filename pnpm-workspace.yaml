allowBuilds:
  supabase: true
  esbuild: true
  sharp: true
  unrs-resolver: true
  lefthook: true

# Security: force-patch transitive advisories. Each entry is scoped to the
# vulnerable range, so it self-clears once a dep ships the patched version.
#   postcss  GHSA-qx2v-qp2m-jg93  (via next>postcss)
#   undici   GHSA-*-7.28          (dev: via jsdom<-vitest)
#   vite     GHSA-fx2h/v6wh       (dev: via vitest; 6.4.3 is the first patch)
overrides:
  postcss@<8.5.10: ">=8.5.10"
  undici@<7.28.0: ">=7.28.0 <8"
  vite@<=6.4.2: ">=6.4.3 <7"
  qs@<6.15.2: ">=6.15.2"
